<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Aura - Transform SOWs into Project Plans{% endblock %}</title>

    <!-- Blend Design System CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blend.css') }}">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    {% block extra_css %}{% endblock %}
</head>
<body class="blend-light">
    <!-- Header -->
    <header class="header-with-logo">
        <div class="blend-logo">
            <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                <!-- Blend Logo SVG - Simplified B symbol -->
                <circle cx="20" cy="30" r="12" fill="#053057" opacity="0.9"/>
                <circle cx="35" cy="30" r="12" fill="#053057" opacity="0.6"/>
                <text x="55" y="38" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" fill="#053057">Blend</text>
            </svg>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/api/results" style="display: none;" id="resultsNav">Results</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>Project Aura &copy; 2025 | AI-Powered Project Management for Blend</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
